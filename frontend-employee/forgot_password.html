<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลืมรหัสผ่าน | ระบบจัดการงานซ่อม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card{
    background:#fff;
    padding:40px;
    width:100%;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#6b7280;
    font-size:.9rem;
}

input{
    width:100%;
    padding:14px;
    margin-top:20px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    font-size:1rem;
}

input:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.link{
    text-align:center;
    margin-top:15px;
    font-size:.9rem;
}

.link a{
    color:#2563eb;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="card">
    <h2>ลืมรหัสผ่าน</h2>
    <p>กรอกอีเมลเพื่อรับลิงก์ตั้งรหัสใหม่</p>

    <input type="email" id="email" placeholder="กรอกอีเมลของคุณ">

    <button onclick="sendReset()">ส่งลิงก์รีเซ็ต</button>

    <div class="link">
        <a href="login.html">กลับไปหน้าเข้าสู่ระบบ</a>
    </div>
</div>

<script>
async function sendReset(){

    const email = document.getElementById("email").value.trim();

    if(!email){
        alert("กรุณากรอกอีเมล");
        return;
    }

    const res = await fetch("/api/auth/forgot-password",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ email })
    });

    const data = await res.json();

    if(!res.ok){
        alert(data.message || "ไม่สามารถส่งลิงก์ได้");
        return;
    }

    alert("ส่งลิงก์รีเซ็ตแล้ว กรุณาตรวจสอบอีเมล");
}
</script>

</body>
</html>
