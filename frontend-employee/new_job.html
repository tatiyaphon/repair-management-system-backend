    <style>
        /* === 1. Variables & Global Styles === */
        :root {
            --primary-color: #2c3e50; /* Dark Blue */
            --secondary-color: #1abc9c; /* Turquoise (Accent) */
            --background-color: #f4f7f9; /* Light Gray Background */
            --card-background: #ffffff;
            --text-color: #2c3e50;
            --border-radius: 15px; 
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --input-focus-shadow: 0 0 8px rgba(26, 188, 156, 0.5);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }
        /* === 3. Form Container & Sections === */
        .form-container {
            background-color: var(--card-background);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 700px;
            margin: 40px auto;
        }

        .form-container h2 {
            text-align: center;
            font-size: 2.2rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--secondary-color);
            font-weight: 700;
        }

        .form-section {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 10px;
            background-color: #fcfcfc;
            border: 1px solid #e0e0e0;
        }

        .form-section h3 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--secondary-color);
            margin: 0 0 20px;
            display: flex; align-items: center; gap: 12px;
        }
        
        .form-section h3 i { color: var(--primary-color); }

        /* Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group.full-width { grid-column: 1 / -1; }

        /* Radio Group for Repair Type */
        .radio-group {
            display: flex;
            flex-wrap: wrap; /* ให้ห่อเมื่อหน้าจอเล็ก */
            gap: 20px;
            padding: 10px 0;
            align-items: center;
        }
        .radio-group label {
            display: inline-flex;
            align-items: center;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 0;
            user-select: none;
        }
        .radio-group input[type="radio"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            appearance: none;
            border: 2px solid var(--secondary-color);
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        .radio-group input[type="radio"]:checked {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
            transform: scale(1.1);
        }

        /* === 4. Input & Label Styles === */
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-color);
            font-size: 0.95rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Kanit', sans-serif;
            box-sizing: border-box;
            background-color: #ffffff;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: var(--input-focus-shadow);
        }

        textarea { resize: vertical; }

        /* Specific style for price field */
        #price-quoted {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--secondary-color);
            text-align: right;
            border-color: #bdc3c7;
        }
        
        /* === 5. Button Style === */
        .btn-submit {
            background-color: var(--secondary-color);
            color: white;
            padding: 18px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            display: block;
            margin: 40px auto 0;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 188, 156, 0.4);
            display: flex; align-items: center; gap: 10px;
        }

        .btn-submit:hover {
            background-color: #16a085;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(26, 188, 156, 0.5);
        }

        /* === 6. Responsive === */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 15px; }
            .form-container { padding: 20px; margin: 20px auto; }
            .form-grid { grid-template-columns: 1fr; }
            .form-section h3 { font-size: 1.2rem; }
            .btn-submit { width: 100%; padding: 15px 0; font-size: 1.1rem; }
        }
/* animation */
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}
    </style>
</head>

    <main>
        <div class="form-container">
            <h2><i class="fas fa-clipboard-list"></i> สร้างใบงานซ่อมใหม่</h2>
            <form id="new-job-form">
                
                <div class="form-section">
                    <h3><i class="fas fa-user-circle"></i> ข้อมูลลูกค้าและการรับเครื่อง</h3>
                    <div class="form-grid">
                        
                        <div class="form-group full-width">
                            <label>สถานะการรับเครื่อง:</label>

                                <label>

                        <div class="form-group">

 <script>
/* ==========================================================
   new_job.html — PRODUCTION READY
========================================================== */

/* =========================
   CONFIG
========================= */
const API_BASE = "/api";
const token = localStorage.getItem("token");

/* =========================
   AUTH CHECK
========================= */
if (!token) {
  alert("กรุณาเข้าสู่ระบบ");
  location.replace("login.html");
}

const headers = {
  "Content-Type": "application/json",
  Authorization: `Bearer ${token}`
};

/* =========================
   LOAD TECHNICIANS (role = tech)
========================= */
async function loadTechnicians() {
  try {
    const res = await fetch(`${API_BASE}/employees/tech`, {
      headers: {
  "Content-Type": "application/json",
  Authorization: `Bearer ${localStorage.getItem("token")}`
}

    });

    if (!res.ok) {
      console.warn("ไม่พบ endpoint /employees/tech");
      return;
    }

    const techs = await res.json();
    const select = document.getElementById("assigned-tech");
    if (!select) return;

    select.innerHTML =
      `<option value="" disabled selected>--- เลือกช่าง ---</option>`;

    techs.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t._id;
      opt.textContent = `${t.firstName} ${t.lastName}`;
      select.appendChild(opt);
    });

  } catch (err) {
    console.error("LOAD TECH ERROR:", err);
    alert("โหลดรายชื่อช่างไม่สำเร็จ");
  }
}

/* =========================
   REPAIR TYPE (radio)
========================= */
function getRepairType() {
  return (
    document.querySelector('input[name="repair-type"]:checked')?.value
    || "ซ่อมใหม่"
  );
}

/* =========================
   SET TODAY DATE
========================= */
document.addEventListener("DOMContentLoaded", () => {
  const received = document.getElementById("received-date");
  if (received) received.valueAsDate = new Date();

  const receiptInput = document.getElementById("employee-id");
  if (receiptInput) {
    receiptInput.value = generateReceiptNumber();
  }
});


/* =========================
   SUBMIT FORM
========================= */
document.getElementById("new-job-form")?.addEventListener("submit", async e => {
  e.preventDefault();

  const jobData = {
    receiptNumber: document.getElementById("employee-id")?.value.trim(),
    customerName: document.getElementById("customer-name")?.value.trim(),
    customerPhone: document.getElementById("customer-phone")?.value.trim(),
    customerAddress: document.getElementById("customer-address")?.value.trim() || null,

    deviceType: document.getElementById("device-type")?.value,
    deviceModel: document.getElementById("device-model")?.value.trim(),
    symptom: document.getElementById("symptom")?.value.trim(),
    accessory: document.getElementById("accessory")?.value.trim() || null,

    priceQuoted: Number(
      document.getElementById("price-quoted")?.value || 0
    ),

    receivedDate: document.getElementById("received-date")?.value,
    startDate: document.getElementById("start-date")?.value || null,
    finishDate: document.getElementById("finished-date")?.value || null,

    assignedTo: document.getElementById("assigned-tech")?.value,
    jobType: getRepairType()
    // ❌ ไม่ส่ง status → backend default = "รับเครื่อง"
  };

  /* =========================
     VALIDATE
  ========================= */
  if (
    !jobData.receiptNumber ||
    !jobData.customerName ||
    !jobData.customerPhone ||
    !jobData.deviceType ||
    !jobData.deviceModel ||
    !jobData.symptom ||
    !jobData.assignedTo
  ) {
    alert("กรุณากรอกข้อมูลให้ครบถ้วน");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/jobs`, {
      method: "POST",
      headers,
      body: JSON.stringify(jobData)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "บันทึกงานไม่สำเร็จ");
      return;
    }

    alert("✅ บันทึกงานซ่อมสำเร็จ");

    /* =========================
       OPEN RECEIPT (PDF)
    ========================= */
    if (data.job?._id) {
     window.open(
  `/employee/receipt.html?id=${data.job._id}`,
  "_blank"
);
    }

    /* =========================
       REDIRECT
    ========================= */
    setTimeout(() => {
      location.replace("employee_dashboard.html");
    }, 800);

  } catch (err) {
    console.error(err);
    alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
  }
});

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", loadTechnicians);

function generateReceiptNumber() {
  const now = new Date();

  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");

  const random = Math.floor(100 + Math.random() * 900); // 3 หลัก
  return `IN${y}${m}${d}-${random}`;
}
/* =========================
   LOAD PROFILE
========================= */
async function loadProfile() {
  const user = await apiFetch(`/employees/me`);
  if (!user) return;

  const avatar = user.avatar || "/uploads/profile/default.jpg";

  const small = document.getElementById("profileAvatar");
  if (small) small.src = avatar;

  const large = document.getElementById("profileAvatarLarge");
  if (large) large.src = avatar;

  const name = document.getElementById("profileNameLarge");
  if (name) name.textContent = user.firstName + " " + user.lastName;

  const role = document.getElementById("profileRole");
  if (role) role.textContent = user.role;
}

document.addEventListener("DOMContentLoaded", loadProfile);

function toggleProfile(){
  document.getElementById("profileDropdown")
    .classList.toggle("show");
}

document.addEventListener("click", function(e){
  const menu = document.getElementById("profileMenu");
  if(!menu.contains(e.target)){
    document.getElementById("profileDropdown")
      .classList.remove("show");
  }
});
async function uploadAvatar(event){

  const file = event.target.files[0];
  if(!file) return;

  const token = localStorage.getItem("token");

  const formData = new FormData();
  formData.append("avatar", file);

  try{

    const res = await fetch("/api/employees/profile/avatar",{
      method:"POST",
      headers:{
        Authorization:`Bearer ${token}`
      },
      body:formData
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.message || "อัปโหลดไม่สำเร็จ");
      return;
    }

    // เปลี่ยนรูปทันที
    const avatarSmall = document.getElementById("profileAvatar");
    const avatarLarge = document.getElementById("profileAvatarLarge");

    if(avatarSmall) avatarSmall.src = data.avatar;
    if(avatarLarge) avatarLarge.src = data.avatar;

  

    alert("เปลี่ยนรูปโปรไฟล์เรียบร้อย");

  }catch(err){
    console.error(err);
    alert("เกิดข้อผิดพลาด");
  }
async function loadProfile(){
  const userId = localStorage.getItem("userId");
  const token = localStorage.getItem("token");

  const res = await fetch(`/api/employees/${userId}/profile`,{
    headers:{
      Authorization:`Bearer ${token}`
    }
  });

  const user = await res.json();

  const avatar = user.avatar || "/uploads/profile/default.jpg";

  // ใส่ทุกที่ที่มีรูป
  if(document.getElementById("profileAvatar")){
    document.getElementById("profileAvatar").src = avatar;
  }

  if(document.getElementById("profileAvatarLarge")){
    document.getElementById("profileAvatarLarge").src = avatar;
  }
}
}
</script>
