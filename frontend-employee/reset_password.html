<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตั้งรหัสผ่านใหม่ | ระบบจัดการงานซ่อม</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Kanit',sans-serif;
    background:linear-gradient(135deg,#16a34a,#22c55e);
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card{
    background:#fff;
    padding:40px;
    width:100%;
    max-width:420px;
    border-radius:20px;
    box-shadow:0 25px 60px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#6b7280;
    font-size:.9rem;
}

input{
    width:100%;
    padding:14px;
    margin-top:20px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    font-size:1rem;
}

input:focus{
    outline:none;
    border-color:#16a34a;
    box-shadow:0 0 0 3px rgba(22,163,74,.2);
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#16a34a;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}
</style>
</head>

<body>

<div class="card">
    <h2>ตั้งรหัสผ่านใหม่</h2>
    <p>กรอกรหัสผ่านใหม่ของคุณ</p>

    <input type="password" id="password" placeholder="รหัสผ่านใหม่">

    <button onclick="resetPassword()">ยืนยันการเปลี่ยนรหัส</button>
</div>

<script>
async function resetPassword(){

    const token = new URLSearchParams(window.location.search).get("token");
    const password = document.getElementById("password").value;

    if(!password || password.length < 6){
        alert("รหัสผ่านต้องอย่างน้อย 6 ตัวอักษร");
        return;
    }

    const res = await fetch(`/api/auth/reset-password/${token}`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ password })
    });

    const data = await res.json();

    if(!res.ok){
        alert(data.message || "ลิงก์หมดอายุหรือไม่ถูกต้อง");
        return;
    }

    alert("เปลี่ยนรหัสผ่านสำเร็จ");
    window.location.href = "login.html";
}
</script>

</body>
</html>
